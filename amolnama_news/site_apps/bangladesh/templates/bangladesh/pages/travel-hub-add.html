{% extends "core/base.html" %}
{% load static %}

{% block title %}{{ seo.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'bangladesh/assets/css/pages/travel-hub.css' %}">
{% endblock %}

{% block content %}
<section class="th-header">
  <div class="th-header-left">
    <h1 data-en="Add Destination">দর্শনীয় স্থান যোগ করুন (Add Destination)</h1>
    <p data-en="Share information about a new destination">নতুন দর্শনীয় স্থানের তথ্য শেয়ার করুন</p>
  </div>
</section>

<form id="thAddForm" novalidate style="max-width:700px;">
  <div style="margin-bottom:1rem;">
    <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Category *">ধরন (Category) *</label>
    <select id="th-category" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" required>
      <option value="" data-en="-- Select --">-- বাছাই করুন --</option>
      {% for cat in categories %}
        <option value="{{ cat.bangladesh_ref_destination_category_id }}" data-en="{{ cat.destination_category_name_en }}">{{ cat.destination_category_name_bn }} ({{ cat.destination_category_name_en }})</option>
      {% endfor %}
    </select>
  </div>

  <div style="margin-bottom:1rem;">
    <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Place Name *">স্থানের নাম *</label>
    <input type="text" id="th-name-bn" maxlength="300" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="যেমন: কক্সবাজার সমুদ্র সৈকত" data-ph-en="e.g. Cox's Bazar Sea Beach">
  </div>

  <div style="margin-bottom:1rem;">
    <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Name (English)">Name (English)</label>
    <input type="text" id="th-name-en" maxlength="300" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="e.g. Cox's Bazar Sea Beach" data-no-bangla>
  </div>

  <div style="margin-bottom:1rem;">
    <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Short Description">সংক্ষিপ্ত বিবরণ</label>
    <textarea id="th-short-desc-bn" rows="2" maxlength="500" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="সংক্ষেপে বর্ণনা করুন..." data-ph-en="Brief description..."></textarea>
  </div>

  <div style="margin-bottom:1rem;">
    <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Detailed Description">বিস্তারিত বিবরণ</label>
    <textarea id="th-desc-bn" rows="5" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="দর্শনীয় স্থানের বিস্তারিত বর্ণনা..." data-ph-en="Detailed description of the destination..."></textarea>
  </div>

  <div style="display:flex;gap:1rem;margin-bottom:1rem;">
    <div style="flex:1;">
      <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Best Season">সেরা ঋতু (Best Season)</label>
      <select id="th-season" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;">
        <option value="" data-en="-- Optional --">-- ঐচ্ছিক --</option>
        {% for s in seasons %}
          <option value="{{ s.bangladesh_ref_season_id }}" data-en="{{ s.season_name_en }} ({{ s.season_months }})">{{ s.season_name_bn }} ({{ s.season_months }})</option>
        {% endfor %}
      </select>
    </div>
    <div style="flex:1;">
      <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Difficulty">কঠিনতা (Difficulty)</label>
      <select id="th-difficulty" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;">
        <option value="" data-en="-- Optional --">-- ঐচ্ছিক --</option>
        <option value="easy" data-en="Easy">সহজ (Easy)</option>
        <option value="moderate" data-en="Moderate">মাঝারি (Moderate)</option>
        <option value="hard" data-en="Hard">কঠিন (Hard)</option>
      </select>
    </div>
  </div>

  <div style="display:flex;gap:1rem;margin-bottom:1rem;">
    <div style="flex:1;">
      <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Entry Fee (৳)">প্রবেশ মূল্য (৳)</label>
      <input type="number" id="th-entry-fee" step="0.01" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="যেমন: 200" data-ph-en="e.g. 200">
    </div>
    <div style="flex:1;">
      <label style="font-weight:600;font-size:.85rem;display:block;margin-bottom:.3rem;" data-en="Visiting Hours">পরিদর্শন সময়</label>
      <input type="text" id="th-visiting-hours" maxlength="200" style="width:100%;padding:.45rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.85rem;" placeholder="যেমন: সকাল ৮টা - সন্ধ্যা ৬টা" data-ph-en="e.g. 8:00 AM - 6:00 PM">
    </div>
  </div>

  <div id="thAddError" style="color:#e74c3c;font-size:.82rem;margin-bottom:.75rem;display:none;"></div>

  <button type="submit" id="thAddSubmit" style="padding:.55rem 1.5rem;font-size:.88rem;font-weight:600;color:#fff;background:var(--primary);border:none;border-radius:var(--radius);cursor:pointer;" data-en="Publish">
    প্রকাশ করুন (Publish)
  </button>
</form>

{% endblock %}

{% block extra_js %}
<script src="{% static 'bangladesh/assets/js/pages/travel-hub-add.js' %}"></script>
{% endblock %}
