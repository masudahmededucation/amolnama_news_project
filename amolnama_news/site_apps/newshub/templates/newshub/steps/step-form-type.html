<div class="step-panel{% if step == 1 and not edit_entry_id %} active{% endif %}"
     data-step="{{ step }}"
     data-step-label-bn="ফর্ম"
     data-step-label-en="Form">
  <div class="form-section">
    <h3 class="form-section-title"><span class="section-icon">📋</span>সংবাদের ধরন নির্বাচন করুন (Select News Type)</h3>
    <input type="hidden" id="news-form-type" name="news_form_type" value="{{ selected_form_type|default:'' }}">
    <div class="form-type-picker" id="form-type-picker" name="form_type_picker">
      {% for item in form_type_items %}
      <div class="form-type-card" data-type="{{ item.group_code }}" data-url="{{ item.url }}"
           data-step-labels='{{ item.step_labels }}'>
        <span class="form-type-check">✓</span>
        <span class="form-type-icon">{{ item.icon }}</span>
        <span class="form-type-name">{{ item.form_name_bn }} ({{ item.form_name_en }})</span>
        <span class="form-type-steps">{{ item.step_count_bn }}</span>
        {% if item.is_restricted %}<span class="form-type-restricted-badge">🔒</span>{% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</div>
