<!-- Constituency Selection (Step 3) -->
<div id="constituency-view" name="constituency_view" hidden>
  <button class="back-button" onclick="navigateBackToDistricts()">← Back / পিছনে</button>
  {% if not user.is_authenticated %}
    <div class="page-message page-message--warning">
      ভোট দিতে অনুগ্রহ করে <a href="/account/login/">লগইন</a> করুন। (Please <a href="/account/login/">log in</a> to cast your vote.)
    </div>
  {% endif %}
  <h3>আপনার নির্বাচনী এলাকা নির্বাচন করুন (Select Your Constituency)</h3>
  <ul class="selection-list" id="constituency-list" name="constituency_list"></ul>
</div>
