<div class="widget">
  <h4>Newsletter</h4>
  <p>Get the best of Amolnama News in your inbox every morning.</p>
  <form onsubmit="event.preventDefault(); var emailInput = this.querySelector('input[type=email]'); if (emailInput) { emailInput.value = ''; emailInput.placeholder = 'শীঘ্রই আসছে!'; }">
    <div class="grid-2 newsletter-form-row">
      <input type="email" class="newsletter-email-input" id="newsletter-email" name="email" required placeholder="you@example.com" aria-label="Email" autocomplete="email"/>
      <button class="button primary" type="submit" id="button" name="button" >Subscribe</button>
    </div>
  </form>
</div>
