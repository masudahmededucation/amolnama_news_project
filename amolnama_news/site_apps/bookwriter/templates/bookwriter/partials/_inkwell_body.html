{% comment %}
  কলম / Inkwell — body content shared by both layout modes.
  Included by:
    - bookwriter/pages/inkwell.html           (standalone shell)
    - bookwriter/pages/inkwell_embedded.html  (embeds inside core/base.html)
  The shells handle <head>, fonts, CSS link, body class, and the
  <script src="...page-inkwell.js"> reference. This partial holds
  ONLY the markup (5 views + 4 overlays).
{% endcomment %}

  {# ========================== WRITER VIEW (default) ========================== #}
  <div class="app">

    {# LEFT RAIL — Library #}
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">কলম</div>
        <div class="brand-tag">writing sanctuary</div>
      </div>

      <div class="rail-head">
        <h3>Chapters</h3>
        <button type="button" class="new-chapter"
                id="bookwriter-chapter-add-button"
                name="bookwriter_chapter_add_button"
                onclick="addChapter()">+ new</button>
      </div>

      {% comment %}
        Logged-in user: render their REAL chapters from DB (loop var
        `book_chapters_list` populated by views.py:bookwriter_inkwell).
        Each chapter carries `data-chapter-id` so the autosave fetch
        knows which row to PATCH. The chapter whose id matches
        `active_chapter_id` gets `.active`.

        Anon visitor: fall back to the hardcoded fiction demo so the
        landing surface still tells the story of what bookwriter is.
      {% endcomment %}
      <div class="chapters"
           id="chapters"
           {% if current_book %}data-book-id="{{ current_book.bookwriter_coll_book_id }}"{% endif %}>
        {% if book_chapters_list %}
          {% for chapter_row in book_chapters_list %}
            <div class="chapter{% if chapter_row.bookwriter_chapter_id == active_chapter_id %} active{% endif %}"
                 draggable="true"
                 data-chapter-id="{{ chapter_row.bookwriter_chapter_id }}">
              <div class="ch-num">{{ chapter_row.chapter_number }}.</div>
              <div class="ch-title">{{ chapter_row.chapter_title_en|default:chapter_row.chapter_title_bn|default:"Untitled" }}</div>
              <div class="ch-meta">
                <span>
                  <i class="ch-dot {% if chapter_row.chapter_word_count > 0 %}draft{% else %}new{% endif %}"></i>
                  {{ chapter_row.chapter_word_count|default:0 }} w
                </span>
              </div>
            </div>
          {% endfor %}
        {% else %}
          <div class="chapter" draggable="true">
            <div class="ch-num">I.</div>
            <div class="ch-title">The Cartographer's Daughter</div>
            <div class="ch-meta"><span><i class="ch-dot done"></i>2,841 w</span><span>3 days ago</span></div>
          </div>
          <div class="chapter" draggable="true">
            <div class="ch-num">II.</div>
            <div class="ch-title">A House of Small Windows</div>
            <div class="ch-meta"><span><i class="ch-dot done"></i>3,104 w</span><span>2 days ago</span></div>
          </div>
          <div class="chapter active" draggable="true">
            <div class="ch-num">III.</div>
            <div class="ch-title">The Letter that Arrived in Winter</div>
            <div class="ch-meta"><span><i class="ch-dot draft"></i>1,687 w</span><span>just now</span></div>
          </div>
          <div class="chapter" draggable="true">
            <div class="ch-num">IV.</div>
            <div class="ch-title">What the River Knew</div>
            <div class="ch-meta"><span><i class="ch-dot new"></i>outline</span><span>unstarted</span></div>
          </div>
          <div class="chapter" draggable="true">
            <div class="ch-num">V.</div>
            <div class="ch-title">Untitled</div>
            <div class="ch-meta"><span><i class="ch-dot new"></i>blank</span><span>—</span></div>
          </div>
        {% endif %}
      </div>

      <div class="book-info">
        <div class="book-title">The Saltwater Almanac</div>
        <div class="book-author">by Eliza Whitmore</div>
        <div class="book-stats">
          <div><strong>7,632</strong>words</div>
          <div><strong>34%</strong>complete</div>
        </div>
      </div>
    </aside>

    {# CENTER — The Manuscript #}
    <section class="stage">
      <div class="toolbar">
        <div class="crumb">
          <em>The Saltwater Almanac</em> &nbsp;·&nbsp; <strong>Chapter III</strong>
          <span class="save-chip" onclick="toggleSnapshots()" title="View version history"><span class="pulse"></span>saved to the shelf · 2m</span>
        </div>
        <div class="tools">
          <button type="button" class="tool-btn b icon"
                  id="bookwriter-tool-bold-button"   name="bookwriter_tool_bold_button"   title="Bold"><b>B</b></button>
          <button type="button" class="tool-btn i icon"
                  id="bookwriter-tool-italic-button" name="bookwriter_tool_italic_button" title="Italic"><i>I</i></button>
          <button type="button" class="tool-btn u icon"
                  id="bookwriter-tool-underline-button" name="bookwriter_tool_underline_button" title="Underline"><u>U</u></button>
          <div class="tool-divider"></div>
          <button type="button" class="tool-btn"
                  id="bookwriter-tool-heading-button" name="bookwriter_tool_heading_button">¶ heading</button>
          <button type="button" class="tool-btn"
                  id="bookwriter-tool-quote-button"   name="bookwriter_tool_quote_button">" quote</button>
          <div class="tool-divider"></div>
          <button type="button" class="tool-btn sprint-trigger"
                  id="bookwriter-tool-sprint-button"  name="bookwriter_tool_sprint_button"
                  onclick="openSprintSetup()" title="Writing sprint">⏱ sprint</button>
          <button type="button" class="tool-btn"
                  id="bookwriter-tool-history-button" name="bookwriter_tool_history_button"
                  onclick="toggleSnapshots()" title="Version history">↺ history</button>
          <button type="button" class="tool-btn"
                  id="bookwriter-tool-share-button"   name="bookwriter_tool_share_button"
                  onclick="openShare()" title="Share with beta readers">share</button>
          <button type="button" class="tool-btn"
                  id="bookwriter-tool-focus-button"   name="bookwriter_tool_focus_button"
                  onclick="enterFocus()" title="Distraction-free writing">◌ focus</button>
        </div>
      </div>

      <div class="manuscript">
        <article class="page fade-in">
          <div class="focus-ribbon">⏳ chapter iii · 1,687 words</div>

          {% comment %}
            Logged-in: real chapter title + sanitized saved HTML (already
            run through core.utils.sanitize_user_html on the way IN via
            views_api.api_bookwriter_chapter_autosave, so |safe is OK).
            Anon: hardcoded demo prose so the marketing surface still
            reads like a finished page, not an empty editor.
          {% endcomment %}
          {% if active_chapter_id %}
            <div class="chapter-label">Chapter {{ book_chapters_list.0.chapter_number|default:"One" }}</div>
            <h1 class="chapter-title" contenteditable="true" spellcheck="false">{{ active_chapter_title }}</h1>
          {% else %}
            <div class="chapter-label">Chapter Three</div>
            <h1 class="chapter-title" contenteditable="true" spellcheck="false">The Letter that Arrived in Winter</h1>
          {% endif %}

          <div class="ornament" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
          </div>

          <div class="prose"
               id="bookwriter-prose"
               name="bookwriter_prose"
               contenteditable="true"
               spellcheck="false"
               {% if active_chapter_id %}data-chapter-id="{{ active_chapter_id }}"{% endif %}>
            {% if active_chapter_id %}
              {{ active_chapter_html|safe }}
            {% else %}
              <p>The letter arrived on a Thursday, folded twice against itself, the ink bled blue through the paper as if the words themselves had been caught out in the rain. Mira turned it over in her hands three times before she dared to open it. The handwriting she knew—of course she knew it—though she had not seen it in eleven years.</p>

              <p>Outside, the snow was doing what snow does: falling without apology, without hurry, the way only the old snows fall in that part of the country. A stray cat watched her from the sill with the considered patience of something that had known hunger and was in no rush to know it again.</p>

              <p>She read the first line. She read it again. Then she set the letter flat on the kitchen table and pressed her palms against it, as though it were a thing that might take flight, or catch fire, or simply <em>be</em>, in some quiet and permanent way, the hinge on which everything after would turn.</p>

              <p>It began, as all the important letters of her life had begun, with her mother's maiden name.</p>
            {% endif %}
          </div>
        </article>
      </div>
    </section>

    {# RIGHT — The Desk #}
    <aside class="desk">

      <div class="card session fade-in">
        <div class="card-head"><span>Today's Session</span><span>—</span></div>
        <div class="nums">
          <div>
            <div class="num-big">842</div>
            <div class="num-label">words today</div>
          </div>
          <div>
            <div class="num-big">47<span class="num-big-suffix">m</span></div>
            <div class="num-label">at the desk</div>
          </div>
        </div>
        <div class="streak">
          <div class="streak-day hit light"></div>
          <div class="streak-day hit"></div>
          <div class="streak-day hit"></div>
          <div class="streak-day hit light"></div>
          <div class="streak-day hit"></div>
          <div class="streak-day hit"></div>
          <div class="streak-day today"></div>
        </div>
        <div class="streak-caption"><strong>7 days</strong> of showing up</div>
      </div>

      <div class="card fade-in">
        <div class="card-head"><span>Daily Goal</span><span>500 w</span></div>
        <div class="goal-wrap">
          <svg class="ring" viewBox="0 0 74 74">
            <circle cx="37" cy="37" r="32" fill="none" stroke="var(--paper-deep)" stroke-width="5"/>
            <circle cx="37" cy="37" r="32" fill="none" stroke="var(--accent)" stroke-width="5"
                    stroke-dasharray="201" stroke-dashoffset="0"
                    stroke-linecap="round" transform="rotate(-90 37 37)"/>
            <text x="37" y="42" text-anchor="middle"
                  style="font-family:'Fraunces',serif;font-size:14px;font-weight:600;fill:var(--ink);">168%</text>
          </svg>
          <div class="goal-text">
            <div><span class="num">842</span> <span class="of">/ 500</span></div>
            <div class="label">You've surpassed today.</div>
          </div>
        </div>
      </div>

      <div class="card fade-in">
        <div class="card-head"><span>Margin Notes</span><span>+ add</span></div>
        <div class="notes-pad">
          <p>Check whether the cat appears in ch. I — continuity.</p>
          <p>Is "eleven years" right? Feels like it should be twelve.</p>
          <p>Consider moving the snow passage earlier.</p>
        </div>
      </div>

      <button type="button" class="publish fade-in"
              id="bookwriter-publish-draft-button"
              name="bookwriter_publish_draft_button"
              onclick="publishFlow()">
        <span>Publish a draft</span>
      </button>
      <div class="publish-meta">
        ePub · PDF · public link · কলম Reader
      </div>

      <div class="card card-frameless fade-in">
        <div class="quote">
          You can always edit a bad page. You can't edit a blank one.
          <cite>— Jodi Picoult</cite>
        </div>
      </div>

    </aside>

  </div>

        <div class="brand-mark">কলম</div>

      </div>

      <div class="section">

        <div class="templates" id="templates">
          <div class="tmpl active" data-style="classical">

              <div class="mt">The Saltwater<br>Almanac</div>
              <div class="ma">E. Whitmore</div>
            </div>
            <div class="tmpl-name">Classical</div>
          </div>
          <div class="tmpl" data-style="modern">
            <div class="mini mini-modern">
              <div>
                <div class="mt">Saltwater<br>Almanac</div>
                <div class="ma">Whitmore</div>
              </div>
            </div>
            <div class="tmpl-name">Modern</div>
          </div>
          <div class="tmpl" data-style="photo">
            <div class="mini mini-photo">
              <div>
                <div class="mt">Saltwater</div>

            </div>
            <div class="tmpl-name">Vintage</div>
          </div>

            <div class="mini mini-type">

              <div class="ma">Whitmore</div>
            </div>
            <div class="tmpl-name">Typographic</div>
          </div>

      </div>

      <div class="section">
        <div class="section-title">Typography</div>
        <div class="field">
          <div class="field-label"><span>Title font</span></div>
          <div class="font-pick" id="fontPick">

          </div>
        </div>
      </div>
    </aside>

    <section class="cover-stage">
      <div class="toolbar">
        <div class="crumb">
          <em>The Saltwater Almanac</em> &nbsp;·&nbsp; <strong>Cover</strong>
          <span class="save-chip"><span class="pulse"></span>draft cover · saved</span>
        </div>
        <div class="tools">
          <button type="button" class="tool-btn"
                  id="bookwriter-cover-preview-spine-button" name="bookwriter_cover_preview_spine_button">preview spine</button>
          <button type="button" class="tool-btn"

  {# ========================== CORKBOARD VIEW (Plot) ========================== #}
  <div class="corkboard-view">
    <aside class="rail">
      <div class="brand">
        <div class="brand-mark">কলম</div>
        <div class="brand-tag">plotting</div>
      </div>
      <div class="rail-head">
        <h3>Act Structure</h3>
      </div>
      <div class="chapters">
        <div class="chapter active"><div class="ch-num">Act I.</div><div class="ch-title">Setup</div><div class="ch-meta"><span>3 cards</span></div></div>

        <div class="chapter"><div class="ch-num">Act III.</div><div class="ch-title">Resolution</div><div class="ch-meta"><span>2 cards</span></div></div>

      <div class="corkboard-grid" id="corkboard">

          <div class="card-title" contenteditable="true" spellcheck="false">The Cartographer's Daughter</div>
          <div class="card-body" contenteditable="true" spellcheck="false">Mira returns to her father's house after the funeral. Finds the first map tucked inside his atlas.</div>
          <div class="card-tag">Act I · Setup</div>
        </div>
        <div class="index-card">
          <div class="card-num">Scene · 02</div>
          <div class="card-title" contenteditable="true" spellcheck="false">A House of Small Windows</div>
          <div class="card-body" contenteditable="true" spellcheck="false">We meet the village. Introduce the lighthouse-keeper as possible antagonist. Plant the rumor about her mother.</div>
          <div class="card-tag">Act I · Setup</div>
        </div>
        <div class="index-card">
