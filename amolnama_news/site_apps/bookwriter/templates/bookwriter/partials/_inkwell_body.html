{% comment %}
  কলম / Inkwell — body content shared by both layout modes.
  Included by:
    - bookwriter/pages/inkwell.html           (standalone shell)
    - bookwriter/pages/inkwell_embedded.html  (embeds inside core/base.html)
  The shells handle <head>, fonts, CSS link, body class, and the
  <script src="...page-inkwell.js"> reference. This partial holds
  ONLY the markup (5 views + 4 overlays).
{% endcomment %}

  {# ========================== WRITER VIEW (default) ========================== #}
  <div class="bookwriter-app">

    {# LEFT RAIL — Library #}
    <aside class="bookwriter-rail">
      <div class="bookwriter-brand">
        <div class="bookwriter-brand-mark">কলম</div>
        <div class="bookwriter-brand-tag">writing sanctuary</div>
      </div>

      <div class="bookwriter-rail-head">
        <h3>Chapters</h3>
        <button type="button" class="bookwriter-new-chapter"
                id="bookwriter-chapter-add-button"
                name="bookwriter_chapter_add_button"
                onclick="addChapter()">+ new</button>
      </div>

      {% comment %}
        Logged-in user: render their REAL chapters from DB (loop var
        `book_chapters_list` populated by views.py:bookwriter_inkwell).
        Each chapter carries `data-chapter-id` so the autosave fetch
        knows which row to PATCH. The chapter whose id matches
        `active_chapter_id` gets `.active`.

        Anon visitor: fall back to the hardcoded fiction demo so the
        landing surface still tells the story of what bookwriter is.
      {% endcomment %}
      <div class="bookwriter-chapters"
           id="chapters"
           {% if current_book %}data-book-id="{{ current_book.bookwriter_coll_book_id }}"{% endif %}>
        {% if book_chapters_list %}
          {% for chapter_row in book_chapters_list %}
            <div class="bookwriter-chapter{% if chapter_row.bookwriter_chapter_id == active_chapter_id %} bookwriter-chapter-row-is-active{% endif %}{% if chapter_row.bookwriter_chapter_id in published_chapter_ids_set %} bookwriter-is-published{% endif %}"
                 draggable="true"
                 data-chapter-id="{{ chapter_row.bookwriter_chapter_id }}"
                 data-chapter-status-code="{{ chapter_row.chapter_status_code }}"
                 data-chapter-visibility-code="{{ chapter_row.chapter_visibility_code }}">
              <div class="bookwriter-chapter-rail-row-number">{{ chapter_row.chapter_number }}.</div>
              <div class="bookwriter-chapter-rail-row-title">{{ chapter_row.chapter_title_en|default:chapter_row.chapter_title_bn|default:"Untitled" }}</div>
              <div class="bookwriter-chapter-rail-row-metadata">
                <span>
                  <i class="bookwriter-chapter-rail-row-status-dot {% if chapter_row.chapter_word_count > 0 %}bookwriter-chapter-rail-row-status-dot-state-draft{% else %}bookwriter-chapter-rail-row-status-dot-state-new{% endif %}"></i>
                  {{ chapter_row.chapter_word_count|default:0 }} w
                </span>
                {% if chapter_row.bookwriter_chapter_id in published_chapter_ids_set %}
                  <span class="bookwriter-chapter-rail-row-publish-badge" title="Published">● live</span>
                {% endif %}
              </div>
              <div class="bookwriter-chapter-status-picker-row">
                <label class="bookwriter-labeled-picker-field" for="bookwriter-chapter-{{ chapter_row.bookwriter_chapter_id }}-status-select">
                  <span class="bookwriter-labeled-picker-label-text">Stage</span>
                  <select class="bookwriter-chapter-status-select"
                          id="bookwriter-chapter-{{ chapter_row.bookwriter_chapter_id }}-status-select"
                          name="bookwriter_chapter_{{ chapter_row.bookwriter_chapter_id }}_status_select"
                          data-target-chapter-id="{{ chapter_row.bookwriter_chapter_id }}"
                          data-target-field="chapter_status_code">
                    {% for status_option in chapter_status_options_list %}
                      <option value="{{ status_option.chapter_status_code }}"{% if chapter_row.chapter_status_code == status_option.chapter_status_code %} selected{% endif %}>{{ status_option.chapter_status_name_en }}</option>
                    {% endfor %}
                  </select>
                </label>
                <label class="bookwriter-labeled-picker-field" for="bookwriter-chapter-{{ chapter_row.bookwriter_chapter_id }}-visibility-select">
                  <span class="bookwriter-labeled-picker-label-text">Visibility</span>
                  <select class="bookwriter-chapter-visibility-select"
                          id="bookwriter-chapter-{{ chapter_row.bookwriter_chapter_id }}-visibility-select"
                          name="bookwriter_chapter_{{ chapter_row.bookwriter_chapter_id }}_visibility_select"
                          data-target-chapter-id="{{ chapter_row.bookwriter_chapter_id }}"
                          data-target-field="chapter_visibility_code">
                    {% for visibility_option in chapter_visibility_options_list %}
                      <option value="{{ visibility_option.chapter_visibility_code }}"{% if chapter_row.chapter_visibility_code == visibility_option.chapter_visibility_code %} selected{% endif %}>{{ visibility_option.chapter_visibility_name_en }}</option>
                    {% endfor %}
                  </select>
                </label>
              </div>
            </div>
          {% endfor %}
        {% else %}
          <div class="bookwriter-chapter" draggable="true">
            <div class="bookwriter-chapter-rail-row-number">1.</div>
            <div class="bookwriter-chapter-rail-row-title">The Cartographer's Daughter</div>
            <div class="bookwriter-chapter-rail-row-metadata"><span><i class="bookwriter-chapter-rail-row-status-dot bookwriter-chapter-rail-row-status-dot-state-done"></i>2,841 w</span><span>3 days ago</span></div>
          </div>
          <div class="bookwriter-chapter" draggable="true">
            <div class="bookwriter-chapter-rail-row-number">2.</div>
            <div class="bookwriter-chapter-rail-row-title">A House of Small Windows</div>
            <div class="bookwriter-chapter-rail-row-metadata"><span><i class="bookwriter-chapter-rail-row-status-dot bookwriter-chapter-rail-row-status-dot-state-done"></i>3,104 w</span><span>2 days ago</span></div>
          </div>
          <div class="bookwriter-chapter bookwriter-chapter-row-is-active" draggable="true">
            <div class="bookwriter-chapter-rail-row-number">3.</div>
            <div class="bookwriter-chapter-rail-row-title">The Letter that Arrived in Winter</div>
            <div class="bookwriter-chapter-rail-row-metadata"><span><i class="bookwriter-chapter-rail-row-status-dot bookwriter-chapter-rail-row-status-dot-state-draft"></i>1,687 w</span><span>just now</span></div>
          </div>
          <div class="bookwriter-chapter" draggable="true">
            <div class="bookwriter-chapter-rail-row-number">4.</div>
            <div class="bookwriter-chapter-rail-row-title">What the River Knew</div>
            <div class="bookwriter-chapter-rail-row-metadata"><span><i class="bookwriter-chapter-rail-row-status-dot bookwriter-chapter-rail-row-status-dot-state-new"></i>outline</span><span>unstarted</span></div>
          </div>
          <div class="bookwriter-chapter" draggable="true">
            <div class="bookwriter-chapter-rail-row-number">5.</div>
            <div class="bookwriter-chapter-rail-row-title">Untitled Chapter</div>
            <div class="bookwriter-chapter-rail-row-metadata"><span><i class="bookwriter-chapter-rail-row-status-dot bookwriter-chapter-rail-row-status-dot-state-new"></i>blank</span><span>—</span></div>
          </div>
        {% endif %}
      </div>

      {% comment %}
        Logged-in user: render real book metadata + live counts. The
        title is contenteditable for the owner — JS debounces the
        input and POSTs to /api/book/<id>/title/. Anonymous visitor
        gets the hardcoded teaser content so the marketing surface
        still reads like a finished book card.
      {% endcomment %}
      {% if current_book %}
        <div class="bookwriter-book-info"
             id="bookwriter-book-info"
             data-book-id="{{ current_book.bookwriter_coll_book_id }}">
          <div class="bookwriter-book-title"
               id="bookwriter-book-title"
               name="bookwriter_book_title"
               contenteditable="true"
               spellcheck="false"
               data-placeholder="Untitled Book">{{ current_book.book_title_en|default:current_book.book_title_bn|default:"" }}</div>
          <div class="bookwriter-book-author"
               id="bookwriter-book-author"
               name="bookwriter_book_author"
               contenteditable="true"
               spellcheck="false"
               data-placeholder="by …">{% if current_book.book_author_display_en or current_book.book_author_display_bn %}by {{ current_book.book_author_display_en|default:current_book.book_author_display_bn }}{% endif %}</div>
          <div class="bookwriter-book-stats">
            <div><strong id="bookwriter-book-word-count">{{ current_book.book_word_count_cached|default:0 }}</strong>words</div>
            <div><strong id="bookwriter-book-chapter-count">{{ current_book.book_chapter_count_cached|default:0 }}</strong>chapters</div>
          </div>

          <div class="bookwriter-book-metadata-fields">
            <label class="bookwriter-book-metadata-field-label" for="bookwriter-book-status-select">Book status</label>
            <select class="bookwriter-book-metadata-select"
                    id="bookwriter-book-status-select"
                    name="bookwriter_book_status_select"
                    data-target-book-id="{{ current_book.bookwriter_coll_book_id }}"
                    data-target-field="book_status_code">
              {% for status_option in book_status_options_list %}
                <option value="{{ status_option.book_status_code }}"{% if current_book.book_status_code == status_option.book_status_code %} selected{% endif %}>{{ status_option.book_status_name_en }}</option>
              {% endfor %}
            </select>

            <label class="bookwriter-book-metadata-field-label" for="bookwriter-book-daily-word-target-input">Daily target</label>
            <input type="number"
                   class="bookwriter-book-metadata-input"
                   id="bookwriter-book-daily-word-target-input"
                   name="bookwriter_book_daily_word_target_input"
                   min="0"
                   max="100000"
                   step="50"
                   value="{{ current_book.book_daily_word_target|default:500 }}"
                   data-target-book-id="{{ current_book.bookwriter_coll_book_id }}"
                   data-target-field="book_daily_word_target">

            <label class="bookwriter-book-metadata-field-label" for="bookwriter-book-word-target-input">Manuscript target</label>
            <input type="number"
                   class="bookwriter-book-metadata-input"
                   id="bookwriter-book-word-target-input"
                   name="bookwriter_book_word_target_input"
                   min="0"
                   max="10000000"
                   step="1000"
                   placeholder="80000"
                   value="{{ current_book.book_word_count_target|default_if_none:'' }}"
                   data-target-book-id="{{ current_book.bookwriter_coll_book_id }}"
                   data-target-field="book_word_count_target">

            <label class="bookwriter-book-metadata-field-label" for="bookwriter-book-synopsis-textarea">Synopsis</label>
            <textarea class="bookwriter-book-metadata-textarea"
                      id="bookwriter-book-synopsis-textarea"
                      name="bookwriter_book_synopsis_textarea"
                      rows="3"
                      maxlength="2000"
                      placeholder="A short synopsis…"
                      data-target-book-id="{{ current_book.bookwriter_coll_book_id }}"
                      data-target-field="book_synopsis">{{ current_book.book_synopsis|default_if_none:'' }}</textarea>
          </div>
        </div>
      {% else %}
        <div class="bookwriter-book-info">
          <div class="bookwriter-book-title">The Saltwater Almanac</div>
          <div class="bookwriter-book-author">by Eliza Whitmore</div>
          <div class="bookwriter-book-stats">
            <div><strong>7,632</strong>words</div>
            <div><strong>34%</strong>complete</div>
          </div>
        </div>
      {% endif %}
    </aside>

    {# CENTER — The Manuscript #}
    <section class="bookwriter-stage">
      <div class="bookwriter-toolbar">
        <div class="bookwriter-toolbar-crumb">
          {% if current_book %}
            <em id="bookwriter-crumb-book-title">{{ current_book.book_title_en|default:current_book.book_title_bn|default:"Untitled Book" }}</em> &nbsp;·&nbsp; <strong id="bookwriter-crumb-chapter-label">Chapter {% if active_chapter_number %}{{ active_chapter_number }}{% else %}1{% endif %}</strong>
          {% else %}
            <em id="bookwriter-crumb-book-title">The Saltwater Almanac</em> &nbsp;·&nbsp; <strong id="bookwriter-crumb-chapter-label">Chapter 3</strong>
          {% endif %}
          <span class="bookwriter-save-chip" onclick="toggleSnapshots()" title="View version history"><span class="bookwriter-pulse"></span>{% if current_book %}saved · just now{% else %}saved to the shelf · 2m{% endif %}</span>
        </div>
        <div class="bookwriter-tools">
          <button type="button" class="bookwriter-tool-btn bookwriter-tool-bold bookwriter-icon"
                  id="bookwriter-tool-bold-button"   name="bookwriter_tool_bold_button"   title="Bold"><b>B</b></button>
          <button type="button" class="bookwriter-tool-btn bookwriter-tool-italic bookwriter-icon"
                  id="bookwriter-tool-italic-button" name="bookwriter_tool_italic_button" title="Italic"><i>I</i></button>
          <button type="button" class="bookwriter-tool-btn bookwriter-tool-underline bookwriter-icon"
                  id="bookwriter-tool-underline-button" name="bookwriter_tool_underline_button" title="Underline"><u>U</u></button>
          <div class="bookwriter-tool-divider"></div>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-heading-button" name="bookwriter_tool_heading_button">¶ heading</button>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-quote-button"   name="bookwriter_tool_quote_button">" quote</button>
          <div class="bookwriter-tool-divider"></div>
          <button type="button" class="bookwriter-tool-btn bookwriter-sprint-trigger"
                  id="bookwriter-tool-sprint-button"  name="bookwriter_tool_sprint_button"
                  onclick="openSprintSetup()" title="Writing sprint">⏱ sprint</button>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-history-button" name="bookwriter_tool_history_button"
                  onclick="toggleSnapshots()" title="Version history">↺ history</button>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-notes-button" name="bookwriter_tool_notes_button"
                  onclick="toggleMarginNotes()" title="Margin notes for this chapter">✎ notes</button>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-share-button"   name="bookwriter_tool_share_button"
                  onclick="openShare()" title="Share with beta readers">share</button>
          <button type="button" class="bookwriter-tool-btn"
                  id="bookwriter-tool-focus-button"   name="bookwriter_tool_focus_button"
                  onclick="enterFocus()" title="Full-screen distraction-free writing"><svg class="bookwriter-tool-btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 6V2h4M14 6V2h-4M2 10v4h4M14 10v4h-4"/></svg> full screen</button>
        </div>
      </div>

      <div class="bookwriter-manuscript">
        <article class="bookwriter-page bookwriter-fade-in">
          {% comment %}
            The focus ribbon shows "Chapter <number> · <words>" — both
            JS-driven on the writer side. Server side we just emit a
            sensible initial value so the ribbon isn't blank during the
            first paint. JS in page-inkwell.js#refresh() rewrites it on
            every input event.
          {% endcomment %}
          <div class="bookwriter-focus-ribbon"
               id="bookwriter-focus-ribbon">⏳ chapter {% if active_chapter_number %}{{ active_chapter_number }}{% else %}iii{% endif %} · {{ active_chapter_html|striptags|wordcount|default:0 }} words</div>

          {% comment %}
            Logged-in: real chapter title + sanitized saved HTML (already
            run through core.utils.sanitize_user_html on the way IN via
            views_api.api_bookwriter_chapter_autosave, so |safe is OK).
            Anon: hardcoded demo prose so the marketing surface still
            reads like a finished page, not an empty editor.
          {% endcomment %}
          {% if active_chapter_id %}
            <div class="bookwriter-chapter-label">Chapter {{ book_chapters_list.0.chapter_number|default:"One" }}</div>
            <h1 class="bookwriter-chapter-title" contenteditable="true" spellcheck="false">{{ active_chapter_title }}</h1>
          {% else %}
            <div class="bookwriter-chapter-label">Chapter Three</div>
            <h1 class="bookwriter-chapter-title" contenteditable="true" spellcheck="false">The Letter that Arrived in Winter</h1>
          {% endif %}

          <div class="bookwriter-ornament" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
          </div>

          <div class="bookwriter-prose"
               id="bookwriter-prose"
               name="bookwriter_prose"
               contenteditable="true"
               spellcheck="false"
               {% if active_chapter_id %}data-chapter-id="{{ active_chapter_id }}"{% endif %}>
            {% if active_chapter_id %}
              {{ active_chapter_html|safe }}
            {% else %}
              <p>The letter arrived on a Thursday, folded twice against itself, the ink bled blue through the paper as if the words themselves had been caught out in the rain. Mira turned it over in her hands three times before she dared to open it. The handwriting she knew—of course she knew it—though she had not seen it in eleven years.</p>

              <p>Outside, the snow was doing what snow does: falling without apology, without hurry, the way only the old snows fall in that part of the country. A stray cat watched her from the sill with the considered patience of something that had known hunger and was in no rush to know it again.</p>

              <p>She read the first line. She read it again. Then she set the letter flat on the kitchen table and pressed her palms against it, as though it were a thing that might take flight, or catch fire, or simply <em>be</em>, in some quiet and permanent way, the hinge on which everything after would turn.</p>

              <p>It began, as all the important letters of her life had begun, with her mother's maiden name.</p>
            {% endif %}
          </div>
        </article>
      </div>
    </section>

    {# RIGHT — The Desk #}
    <aside class="bookwriter-desk">

      {% comment %}
        TODAY'S SESSION + DAILY GOAL — real numbers when logged in.
        - words today        : sum of session_words_added for today
        - at the desk         : session_active_seconds / 60 (rendered
                                in JS via setInterval ticks once
                                we wire active-time tracking)
        - streak dots         : 7 most-recent days, hit if any words
                                were written that day
        - goal ring %         : today's words / book_daily_word_target
                                (capped at 150% for readability)
      {% endcomment %}
      {% if current_book %}
        <div class="bookwriter-card bookwriter-session bookwriter-fade-in">
          <div class="bookwriter-card-head"><span>Today's Session</span><span>—</span></div>
          <div class="bookwriter-nums">
            <div>
              <div class="bookwriter-num-big" id="bookwriter-today-words">{{ today_session_words|default:0 }}</div>
              <div class="bookwriter-num-label">words today</div>
            </div>
            <div>
              <div class="bookwriter-num-big" id="bookwriter-today-minutes-wrap"><span id="bookwriter-today-minutes">{{ today_session_minutes|default:0 }}</span><span class="bookwriter-num-big-suffix">m</span></div>
              <div class="bookwriter-num-label">at the desk</div>
            </div>
          </div>
          <div class="bookwriter-streak">
            {% for day_was_active in last_seven_streak_days %}
              <div class="bookwriter-streak-day{% if day_was_active %} bookwriter-hit{% endif %}{% if forloop.last %} bookwriter-today{% endif %}"></div>
            {% endfor %}
          </div>
          <div class="bookwriter-streak-caption"><strong id="bookwriter-current-streak">{{ current_streak_days|default:0 }} day{{ current_streak_days|pluralize }}</strong> of showing up</div>
        </div>

        <div class="bookwriter-card bookwriter-fade-in">
          <div class="bookwriter-card-head"><span>Daily Goal</span><span>{{ daily_word_target }} w</span></div>
          <div class="bookwriter-goal-wrap">
            <svg class="bookwriter-ring" viewBox="0 0 74 74">
              <circle cx="37" cy="37" r="32" fill="none" stroke="var(--paper-deep)" stroke-width="5"/>
              <circle cx="37" cy="37" r="32" fill="none" stroke="var(--accent)" stroke-width="5"
                      stroke-dasharray="201" stroke-dashoffset="0"
                      stroke-linecap="round" transform="rotate(-90 37 37)"/>
              <text x="37" y="42" text-anchor="middle"
                    class="bookwriter-goal-ring-percent-label">{{ daily_goal_progress_percent|default:0 }}%</text>
            </svg>
            <div class="bookwriter-goal-text">
              <div><span class="bookwriter-goal-num" id="bookwriter-goal-words">{{ today_session_words|default:0 }}</span> <span class="bookwriter-of">/ {{ daily_word_target }}</span></div>
              <div class="bookwriter-label" id="bookwriter-goal-caption">{% if daily_goal_progress_percent >= 100 %}You've hit today.{% else %}Keep going.{% endif %}</div>
            </div>
          </div>
        </div>
      {% else %}
        <div class="bookwriter-card bookwriter-session bookwriter-fade-in">
          <div class="bookwriter-card-head"><span>Today's Session</span><span>—</span></div>
          <div class="bookwriter-nums">
            <div>
              <div class="bookwriter-num-big">842</div>
              <div class="bookwriter-num-label">words today</div>
            </div>
            <div>
              <div class="bookwriter-num-big">47<span class="bookwriter-num-big-suffix">m</span></div>
              <div class="bookwriter-num-label">at the desk</div>
            </div>
          </div>
          <div class="bookwriter-streak">
            <div class="bookwriter-streak-day bookwriter-hit bookwriter-light"></div>
            <div class="bookwriter-streak-day bookwriter-hit"></div>
            <div class="bookwriter-streak-day bookwriter-hit"></div>
            <div class="bookwriter-streak-day bookwriter-hit bookwriter-light"></div>
            <div class="bookwriter-streak-day bookwriter-hit"></div>
            <div class="bookwriter-streak-day bookwriter-hit"></div>
            <div class="bookwriter-streak-day bookwriter-today"></div>
          </div>
          <div class="bookwriter-streak-caption"><strong>7 days</strong> of showing up</div>
        </div>

        <div class="bookwriter-card bookwriter-fade-in">
          <div class="bookwriter-card-head"><span>Daily Goal</span><span>500 w</span></div>
          <div class="bookwriter-goal-wrap">
            <svg class="bookwriter-ring" viewBox="0 0 74 74">
              <circle cx="37" cy="37" r="32" fill="none" stroke="var(--paper-deep)" stroke-width="5"/>
              <circle cx="37" cy="37" r="32" fill="none" stroke="var(--accent)" stroke-width="5"
                      stroke-dasharray="201" stroke-dashoffset="0"
                      stroke-linecap="round" transform="rotate(-90 37 37)"/>
              <text x="37" y="42" text-anchor="middle"
                    class="bookwriter-goal-ring-percent-label">168%</text>
            </svg>
            <div class="bookwriter-goal-text">
              <div><span class="bookwriter-goal-num">842</span> <span class="bookwriter-of">/ 500</span></div>
              <div class="bookwriter-label">You've surpassed today.</div>
            </div>
          </div>
        </div>
      {% endif %}

      <div class="bookwriter-card bookwriter-fade-in">
        <div class="bookwriter-card-head"><span>Margin Notes</span><span>+ add</span></div>
        <div class="bookwriter-notes-pad">
          <p>Check whether the cat appears in ch. I — continuity.</p>
          <p>Is "eleven years" right? Feels like it should be twelve.</p>
          <p>Consider moving the snow passage earlier.</p>
        </div>
      </div>

      <button type="button" class="bookwriter-publish bookwriter-fade-in"
              id="bookwriter-publish-draft-button"
              name="bookwriter_publish_draft_button"
              onclick="publishFlow()">
        <span>Publish a draft</span>
      </button>
      <div class="bookwriter-publish-meta">
        ePub · PDF · public link · কলম Reader
      </div>

      <div class="bookwriter-card bookwriter-card-frameless bookwriter-fade-in">
        <div class="bookwriter-quote">
          You can always edit a bad page. You can't edit a blank one.
          <cite>— Jodi Picoult</cite>
        </div>
      </div>

    </aside>

  </div>


  {# ========================== COVER DESIGNER VIEW ========================== #}
  <div class="bookwriter-cover-view">

    <aside class="bookwriter-cover-rail">
      <div class="bookwriter-brand">
        <div class="bookwriter-brand-mark">কলম</div>
        <div class="bookwriter-brand-tag">cover studio</div>
      </div>

      <div class="bookwriter-section">
        <div class="bookwriter-section-title">Templates</div>
        <div class="bookwriter-templates" id="templates">
          <div class="bookwriter-cover-template-tile{% if not saved_cover_design_state.cover_template_code or saved_cover_design_state.cover_template_code == 'classical' %} bookwriter-cover-template-tile-is-selected{% endif %}" data-style="classical">
            <div class="bookwriter-cover-mini-preview bookwriter-cover-mini-classical">
              <div class="bookwriter-cover-mini-title">The Saltwater<br>Almanac</div>
              <div class="bookwriter-cover-mini-author">E. Whitmore</div>
            </div>
            <div class="bookwriter-cover-template-tile-name">Classical</div>
          </div>
          <div class="bookwriter-cover-template-tile{% if saved_cover_design_state.cover_template_code == 'modern' %} bookwriter-cover-template-tile-is-selected{% endif %}" data-style="modern">

  {# ========================== CORKBOARD VIEW (Plot) ========================== #}
  <div class="bookwriter-corkboard-view">
    <aside class="bookwriter-rail">
      <div class="bookwriter-brand">
        <div class="bookwriter-brand-mark">কলম</div>
        <div class="bookwriter-brand-tag">plotting</div>
      </div>
      <div class="bookwriter-rail-head">
        <h3>Act Structure</h3>
      </div>
      <div class="bookwriter-chapters">
        <div class="bookwriter-chapter bookwriter-chapter-row-is-active"><div class="bookwriter-chapter-rail-row-number">Act I.</div><div class="bookwriter-chapter-rail-row-title">Setup</div><div class="bookwriter-chapter-rail-row-metadata"><span>3 cards</span></div></div>
        <div class="bookwriter-chapter"><div class="bookwriter-chapter-rail-row-number">Act II.</div><div class="bookwriter-chapter-rail-row-title">Confrontation</div><div class="bookwriter-chapter-rail-row-metadata"><span>5 cards</span></div></div>
        <div class="bookwriter-chapter"><div class="bookwriter-chapter-rail-row-number">Act III.</div><div class="bookwriter-chapter-rail-row-title">Resolution</div><div class="bookwriter-chapter-rail-row-metadata"><span>2 cards</span></div></div>
      </div>
      <div class="bookwriter-book-info">
        <div class="bookwriter-book-title">The Saltwater Almanac</div>
        <div class="bookwriter-book-author">plot map · 10 scenes</div>
      </div>
    </aside>

    <section class="bookwriter-corkboard-stage">
      <div class="bookwriter-corkboard-header">
        <div>
          <h2>The Saltwater Almanac — Plot Board</h2>
          <p>Drag cards to reorder. Click to edit. Pin your plot before you write it.</p>
        </div>
        <button type="button" class="bookwriter-add-card"
                id="bookwriter-corkboard-add-card-button"
                name="bookwriter_corkboard_add_card_button"
                onclick="addIndexCard()">+ new card</button>
      </div>

      {% comment %}
        Logged-in user: render REAL plot cards from DB, each with
        data-plot-card-id so JS can target it for inline autosave +
        delete. Anon visitor: keep the hardcoded scene 01-07 so the
        marketing surface still tells the story.
      {% endcomment %}
      <div class="bookwriter-corkboard-grid" id="corkboard">
        {% if current_book %}
          {% for plot_card_row in book_plot_cards_list %}
            <div class="bookwriter-index-card"
                 data-plot-card-id="{{ plot_card_row.bookwriter_plot_card_id }}"
                 data-linked-chapter-id="{{ plot_card_row.link_bookwriter_chapter_id|default_if_none:'' }}">
              <div class="bookwriter-card-num">Scene · {% if plot_card_row.card_scene_number %}{{ plot_card_row.card_scene_number|stringformat:"02d" }}{% else %}—{% endif %}</div>
              <div class="bookwriter-card-title" contenteditable="true" spellcheck="false" data-card-field="card_title">{{ plot_card_row.card_title|default:"" }}</div>
              <div class="bookwriter-card-body{% if not plot_card_row.card_body %} bookwriter-card-body-placeholder{% endif %}" contenteditable="true" spellcheck="false" data-card-field="card_body">{{ plot_card_row.card_body|default:"Click to describe what happens…" }}</div>
              <div class="bookwriter-card-tag" contenteditable="true" spellcheck="false" data-card-field="card_tag">{{ plot_card_row.card_tag|default:"unplaced" }}</div>
              <label class="bookwriter-labeled-picker-field" for="bookwriter-plot-card-{{ plot_card_row.bookwriter_plot_card_id }}-chapter-select">
                <span class="bookwriter-labeled-picker-label-text">Promote to chapter</span>
                <select class="bookwriter-plot-card-chapter-select"
                        id="bookwriter-plot-card-{{ plot_card_row.bookwriter_plot_card_id }}-chapter-select"
                        name="bookwriter_plot_card_{{ plot_card_row.bookwriter_plot_card_id }}_chapter_select"
                        data-target-plot-card-id="{{ plot_card_row.bookwriter_plot_card_id }}">
                  <option value="">— Unplaced —</option>
                  {% for chapter_option in book_chapters_list %}
                    <option value="{{ chapter_option.bookwriter_chapter_id }}"{% if plot_card_row.link_bookwriter_chapter_id == chapter_option.bookwriter_chapter_id %} selected{% endif %}>Ch.{{ chapter_option.chapter_number }} · {{ chapter_option.chapter_title_en|default:chapter_option.chapter_title_bn|default:"Untitled" }}</option>
                  {% endfor %}
                </select>
              </label>
            </div>
          {% empty %}
            <div class="bookwriter-index-card bookwriter-index-card-empty-state">
              <div class="bookwriter-card-num">Scene · —</div>
              <div class="bookwriter-card-title">Your corkboard is empty.</div>
              <div class="bookwriter-card-body bookwriter-card-body-placeholder">Click "+ new card" above to start outlining.</div>
              <div class="bookwriter-card-tag">unplaced</div>
            </div>
          {% endfor %}
        {% else %}
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 01</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">The Cartographer's Daughter</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">Mira returns to her father's house after the funeral. Finds the first map tucked inside his atlas.</div>
            <div class="bookwriter-card-tag">Act I · Setup</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 02</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">A House of Small Windows</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">We meet the village. Introduce the lighthouse-keeper as possible antagonist. Plant the rumor about her mother.</div>
            <div class="bookwriter-card-tag">Act I · Setup</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 03</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">The Letter that Arrived in Winter</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">Inciting incident: the letter from her mother, eleven years dead. Mira decides to follow the maps.</div>
            <div class="bookwriter-card-tag">Act I · Inciting</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 04</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">Crossing the Causeway</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">Mira travels to the first marked island. Storm scene. Meets the fisherman who claims to have known her mother.</div>
            <div class="bookwriter-card-tag">Act II · Journey</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 05</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">What the River Knew</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">Midpoint revelation — the maps aren't of islands but of years. Her mother was charting time, not geography.</div>
            <div class="bookwriter-card-tag">Act II · Midpoint</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 06</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">The Second Letter</div>
            <div class="bookwriter-card-body" contenteditable="true" spellcheck="false">A second letter appears, written in a hand Mira doesn't recognize. Complication — someone else is tracking her.</div>
            <div class="bookwriter-card-tag">Act II · Complication</div>
          </div>
          <div class="bookwriter-index-card">
            <div class="bookwriter-card-num">Scene · 07</div>
            <div class="bookwriter-card-title" contenteditable="true" spellcheck="false">Untitled</div>
            <div class="bookwriter-card-body bookwriter-card-body-placeholder" contenteditable="true" spellcheck="false">Click to begin outlining…</div>
            <div class="bookwriter-card-tag">unplaced</div>
          </div>
        {% endif %}
      </div>
    </section>
  </div>

            <div class="bookwriter-bible-portrait"
                 {% if first_entry.entry_avatar_color_hex and first_entry.entry_avatar_color_hex_2 %}style="--bookwriter-bible-avatar-hex-1:{{ first_entry.entry_avatar_color_hex }};--bookwriter-bible-avatar-hex-2:{{ first_entry.entry_avatar_color_hex_2 }};"{% endif %}>

            <div contenteditable="true" spellcheck="false" data-bible-field="entry_biography" data-placeholder="Write a short biography…">{{ first_entry.entry_biography|default:"" }}</div>

            <h3>Notes</h3>

                   id="bookwriter-bible-image-url-input"
                   name="bookwriter_bible_image_url_input"
                   placeholder="https://…"
                   maxlength="1000"
                   value="{{ first_entry.entry_image_url|default:'' }}"
                   data-bible-field="entry_image_url">
            {% if first_entry.entry_image_url %}
              <img class="bookwriter-bible-image-preview"
                   id="bookwriter-bible-image-preview"
                   src="{{ first_entry.entry_image_url }}"
                   alt="{{ first_entry.entry_name|default:'Portrait' }}"
                   loading="lazy"
                   decoding="async">
            {% else %}
              <img class="bookwriter-bible-image-preview"
                   id="bookwriter-bible-image-preview"
                   src=""
                   alt=""
                   loading="lazy"
                   decoding="async"
                   hidden>
            {% endif %}
          </div>

          <div class="bookwriter-bible-section bookwriter-bible-attributes-section">
            <h3>Custom attributes</h3>

              {# Rows hydrated client-side from entry_attributes_json. #}
            </div>

                    class="bookwriter-bible-attribute-add-button"
                    id="bookwriter-bible-attribute-add-button"
                    name="bookwriter_bible_attribute_add_button">+ Add attribute</button>

                   id="bookwriter-bible-entry-attributes-json"
                   name="bookwriter_bible_entry_attributes_json"
                   value="{{ first_entry.entry_attributes_json|default:'' }}">
          </div>
        {% endwith %}
      {% elif current_book %}
        <div class="bookwriter-bible-detail-empty-state">
          <div class="bookwriter-bible-detail-empty-state-icon">📖</div>
          <div class="bookwriter-bible-detail-empty-state-title">Your worldbuilding starts here</div>
          <div class="bookwriter-bible-detail-empty-state-text">
            Add a character, location, object, research note, or piece of lore.
            Each entry stays with this book and travels with you across chapters.
          </div>
        </div>
      {% else %}
        <div class="bookwriter-bible-hero">
          <div class="bookwriter-bible-portrait">M</div>
          <div class="bookwriter-flex-fill">
            <h1 contenteditable="true" spellcheck="false">Mira Calloway</h1>
            <div class="bookwriter-role-edit" contenteditable="true" spellcheck="false">the cartographer's daughter · protagonist · 34</div>
            <div class="bookwriter-tags">
              <span class="bookwriter-tag">POV</span>
              <span class="bookwriter-tag">Act I–III</span>
              <span class="bookwriter-tag">9 scenes</span>
              <span class="bookwriter-tag">arc: grief → agency</span>
            </div>
          </div>
        </div>

        <div class="bookwriter-bible-section">
          <h3>Biography</h3>
          <p contenteditable="true" spellcheck="false">Mira was eight years old when her mother vanished at sea, and eleven when her father stopped pretending there was anything to wait for. She grew up in the narrow house at the end of the causeway, raised on atlases and silence, learning the names of distant islands before she learned the names of her own feelings.</p>
          <p contenteditable="true" spellcheck="false">She left for the mainland at nineteen, made a life as an archivist, and returned only when her father died and left her the house, the atlas, and the first of the maps.</p>
        </div>

        <div class="bookwriter-bible-section">
          <h3>Notes</h3>
          <p contenteditable="true" spellcheck="false">Mira should never cry on the page. Her grief shows up in what she doesn't say, in the way she handles her father's things. When she finally does cry, it should land like weather, not a scene.</p>
        </div>
      {% endif %}
    </section>
  </div>

              id="bookwriter-sprint-duration-10-button" name="bookwriter_sprint_duration_10_button" data-min="10">10m</button>
      <button type="button" class="bookwriter-sprint-opt bookwriter-sprint-opt-is-selected"
              id="bookwriter-sprint-duration-25-button" name="bookwriter_sprint_duration_25_button" data-min="25">25m</button>
      <button type="button" class="bookwriter-sprint-opt"
              id="bookwriter-sprint-duration-45-button" name="bookwriter_sprint_duration_45_button" data-min="45">45m</button>
      <button type="button" class="bookwriter-sprint-opt"
              id="bookwriter-sprint-duration-60-button" name="bookwriter_sprint_duration_60_button" data-min="60">60m</button>
    </div>
    <button type="button" class="bookwriter-sprint-start"
            id="bookwriter-sprint-begin-button"
            name="bookwriter_sprint_begin_button"
            onclick="startSprint()">Begin sprint</button>
  </div>

  <div class="bookwriter-sprint-float">
    <div class="bookwriter-sprint-clock" id="sprintClock">25:00</div>
    <div class="bookwriter-sprint-label"><strong>Sprint</strong>write without pausing</div>
    <button type="button" class="bookwriter-sprint-btn bookwriter-pause"
            id="sprintPause" name="bookwriter_sprint_pause_button"
            onclick="pauseSprint()">pause</button>
    <button type="button" class="bookwriter-sprint-close"
            id="bookwriter-sprint-close-button" name="bookwriter_sprint_close_button"
            onclick="endSprint()">×</button>
  </div>


  {# ========================== BETA SHARE MODAL ========================== #}
  <div class="bookwriter-modal-backdrop" onclick="if(event.target===this) closeShare()">
    <div class="bookwriter-modal">
      <button type="button" class="bookwriter-modal-close"
              id="bookwriter-share-modal-close-button"
              name="bookwriter_share_modal_close_button"
              onclick="closeShare()">×</button>
      <h2>Share with beta readers</h2>
      <p class="bookwriter-subhead">Send a private link to trusted readers. They see only what you've written so far — and only what you let them do.</p>

      <div class="bookwriter-share-link">
        <input id="shareLink" name="shareLink" type="text" value="kalom.amolnama.news/share/k2p8qx-saltwater-ch3" readonly autocomplete="off">
        <button type="button"
                id="bookwriter-share-copy-link-button"
                name="bookwriter_share_copy_link_button"
                onclick="copyShareLink(this)">Copy</button>
      </div>

      <div class="bookwriter-share-permission-group">
        <h4>What can readers do?</h4>
        <div class="bookwriter-share-permission-tile bookwriter-share-permission-tile-is-selected" onclick="pickPerm(this)" data-perm="read">
          <div class="bookwriter-share-permission-radio"></div>
          <div class="bookwriter-share-permission-text"><div class="bookwriter-share-permission-title">Read only</div><div class="bookwriter-share-permission-description">They can read every published chapter. No feedback, no notes.</div></div>
        </div>
        <div class="bookwriter-share-permission-tile" onclick="pickPerm(this)" data-perm="comment">
          <div class="bookwriter-share-permission-radio"></div>
          <div class="bookwriter-share-permission-text"><div class="bookwriter-share-permission-title">Read &amp; leave margin notes</div><div class="bookwriter-share-permission-description">They can highlight passages and leave comments. They can't edit your manuscript.</div></div>
        </div>
        <div class="bookwriter-share-permission-tile" onclick="pickPerm(this)" data-perm="suggest">
          <div class="bookwriter-share-permission-radio"></div>
          <div class="bookwriter-share-permission-text"><div class="bookwriter-share-permission-title">Read &amp; suggest edits</div><div class="bookwriter-share-permission-description">Suggestions come to you as tracked changes you can accept or reject.</div></div>
        </div>
      </div>

      <div class="bookwriter-share-permission-group">
        {% if current_book %}
          <h4>Active share links ({{ active_beta_share_links_list|length }})</h4>
          <div class="bookwriter-reader-list" id="bookwriter-active-beta-share-list">
            {% if active_beta_share_links_list %}
              {% for share_row in active_beta_share_links_list %}
                <div class="bookwriter-reader bookwriter-active-share-row"
                     data-beta-share-link-id="{{ share_row.bookwriter_beta_share_link_id }}"
                     data-share-token="{{ share_row.share_link_token }}">
                  <div class="bookwriter-reader-avatar">{{ share_row.beta_permission_code|slice:":1" }}</div>
                  <div class="bookwriter-reader-name">…/{{ share_row.share_link_token|slice:":12" }}</div>
                  <div class="bookwriter-reader-perm">{{ share_row.beta_permission_code }}</div>
                  <button type="button" class="bookwriter-reader-remove bookwriter-revoke-share-button"
                          id="bookwriter-share-revoke-{{ share_row.bookwriter_beta_share_link_id }}-button"
                          name="bookwriter_share_revoke_{{ share_row.bookwriter_beta_share_link_id }}_button"
                          title="Revoke this link">×</button>
                </div>
              {% endfor %}
            {% else %}
              <div class="bookwriter-active-share-empty">No active share links yet. The Copy button above mints one for you.</div>
            {% endif %}
          </div>
        {% else %}
          <h4>Current readers (demo)</h4>
          <div class="bookwriter-reader-list">
            <div class="bookwriter-reader">
              <div class="bookwriter-reader-avatar">M</div>
              <div class="bookwriter-reader-name">Marguerite Holloway</div>
              <div class="bookwriter-reader-perm">comment</div>
              <button type="button" class="bookwriter-reader-remove"
                      id="bookwriter-share-reader-remove-1-button"
                      name="bookwriter_share_reader_remove_1_button"
                      title="Remove">×</button>
            </div>
            <div class="bookwriter-reader">
              <div class="bookwriter-reader-avatar bookwriter-reader-avatar-demo-moss">D</div>
              <div class="bookwriter-reader-name">Daniel Suh</div>
              <div class="bookwriter-reader-perm">read</div>
              <button type="button" class="bookwriter-reader-remove"
                      id="bookwriter-share-reader-remove-2-button"
                      name="bookwriter_share_reader_remove_2_button"
                      title="Remove">×</button>
            </div>
            <div class="bookwriter-reader">
              <div class="bookwriter-reader-avatar bookwriter-reader-avatar-demo-accent">R</div>
              <div class="bookwriter-reader-name">Rose Adeyemi</div>
              <div class="bookwriter-reader-perm">suggest</div>
              <button type="button" class="bookwriter-reader-remove"
                      id="bookwriter-share-reader-remove-3-button"
                      name="bookwriter_share_reader_remove_3_button"
                      title="Remove">×</button>
            </div>
          </div>
        {% endif %}
      </div>

      {% if current_book %}
        <div class="bookwriter-share-permission-group">
          <h4>Beta readers ({{ active_beta_readers_list|length }})</h4>
          <form class="bookwriter-beta-reader-invite-form"
                id="bookwriter-beta-reader-invite-form"
                onsubmit="return false;"
                data-book-id="{{ current_book.bookwriter_coll_book_id }}">
            <input type="email"
                   class="bookwriter-beta-reader-invite-email-input"
                   id="bookwriter-beta-reader-invite-email-input"
                   name="bookwriter_beta_reader_invite_email_input"
                   placeholder="reader@example.com"
                   maxlength="254"
                   autocomplete="off">
            <select class="bookwriter-beta-reader-invite-permission-select"
                    id="bookwriter-beta-reader-invite-permission-select"
                    name="bookwriter_beta_reader_invite_permission_select">
              <option value="read">Read only</option>
              <option value="comment" selected>Read &amp; comment</option>
              <option value="suggest">Read &amp; suggest edits</option>
            </select>
            <button type="button"
                    class="bookwriter-beta-reader-invite-submit-button"
                    id="bookwriter-beta-reader-invite-submit-button"
                    name="bookwriter_beta_reader_invite_submit_button">Invite</button>
          </form>
          <div class="bookwriter-reader-list" id="bookwriter-beta-reader-list">
            {% if active_beta_readers_list %}
              {% for beta_reader_row in active_beta_readers_list %}
                <div class="bookwriter-reader bookwriter-beta-reader-row"
                     data-beta-reader-id="{{ beta_reader_row.bookwriter_beta_reader_id }}">
                  <div class="bookwriter-reader-avatar">{{ beta_reader_row.reader_avatar_initial|default:beta_reader_row.reader_email|slice:":1" }}</div>
                  <div class="bookwriter-reader-name">{{ beta_reader_row.reader_display_name|default:beta_reader_row.reader_email }}</div>
                  <div class="bookwriter-reader-perm">{{ beta_reader_row.beta_permission_code }}</div>
                  <button type="button" class="bookwriter-reader-remove bookwriter-beta-reader-remove-button"
                          id="bookwriter-beta-reader-{{ beta_reader_row.bookwriter_beta_reader_id }}-remove-button"
                          name="bookwriter_beta_reader_{{ beta_reader_row.bookwriter_beta_reader_id }}_remove_button"
                          title="Remove this reader">×</button>
                </div>
              {% endfor %}
            {% else %}
              <div class="bookwriter-beta-reader-empty">No beta readers invited yet.</div>
            {% endif %}
          </div>
        </div>
      {% endif %}
    </div>
  </div>
