<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>প্রবেশাধিকার নেই — আমলনামা নিউজ</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans Bengali',system-ui,-apple-system,sans-serif;background:#f8f9fa;color:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
    .error-box{background:#fff;padding:3rem 2.5rem;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:440px;width:100%}
    .error-code{font-size:4rem;font-weight:800;color:#f59e0b;margin-bottom:.5rem;line-height:1}
    .error-title{font-size:1.3rem;font-weight:700;margin-bottom:.75rem}
    .error-text{font-size:.95rem;color:#666;margin-bottom:1.5rem;line-height:1.6}
    .error-home{display:inline-block;padding:.7rem 2rem;background:#1B6B4A;color:#fff;border:none;border-radius:24px;font-size:.95rem;font-weight:700;text-decoration:none;cursor:pointer}
    .error-home:hover{opacity:.9}
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">403</div>
    <h1 class="error-title">প্রবেশাধিকার নেই</h1>
    <p class="error-text">এই পৃষ্ঠাটি দেখার অনুমতি আপনার নেই।<br>লগইন করুন অথবা হোমপেজে ফিরে যান।</p>
    <a href="/" class="error-home">হোমপেজে ফিরুন</a>
  </div>
</body>
</html>
